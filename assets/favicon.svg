<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#015382" />
      <stop offset="100%" stop-color="#00253a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff59d" />
      <stop offset="50%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#c6a300" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Base Card with gold border -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" stroke="#ffcc00" stroke-width="12" />
  
  <!-- Inner subtle borders for luxury feel -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="none" stroke="#26c6da" stroke-width="2" opacity="0.3" />
  
  <!-- Stylized Monogram F & Visibility Accent -->
  <g transform="translate(42, -5)">
    <!-- Vertical line of F -->
    <path d="M140 130 c0,-12 10,-22 22,-22 l38 0 c12 0 22 10 22 22 l0 250 c0,12 -10,22 -22,22 l-38 0 c-12 0 -22,-10 -22,-22 z" fill="url(#goldGrad)" />
    
    <!-- Top horizontal arm of F -->
    <path d="M222 110 l115 0 c14 0 24 13 20 28 l-10 32 c-4 12 -15 20 -28 20 l-97 0 z" fill="url(#goldGrad)" />
    
    <!-- Middle horizontal arm of F -->
    <path d="M222 230 l80 0 c13 0 23 8 20 22 l-8 28 c-3 12 -14 20 -27 20 l-65 0 z" fill="url(#goldGrad)" opacity="0.95" />
  
    <!-- Four-point Marketing Star / Brilliance Sparkle in the upper right -->
    <path d="M370 170 q0,45 45,45 q-45 0 -45 45 q0,-45 -45,-45 q45 0 45,-45 z" fill="#ffcc00" />
    <circle cx="370" cy="215" r="7" fill="#ffffff" />
  </g>
</svg>
